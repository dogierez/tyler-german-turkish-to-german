<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Vocabulary Leagues</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        body {
            background-color: #050505;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto; 
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
        }

        .shield-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .progress-text {
            color: #888;
            font-size: 16px;
            font-family: monospace;
            text-transform: uppercase;
        }
        
        .shield-btn {
            background: #111;
            border: 4px solid;
            border-radius: 10% 10% 50% 50% / 10% 10% 60% 60%; 
            color: inherit;
            width: 180px;
            height: 220px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 20px currentColor; 
        }

        .shield-btn:hover {
            background: currentColor;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.9), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .shield-number {
            font-family: 'MedievalSharp', serif;
            font-size: 56px;
            margin-bottom: 5px;
            line-height: 1;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .shield-name {
            font-family: inherit;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
        }

        .iron-color { color: #7a7a7a; }      
        .copper-color { color: #ffa500; }    
        .bronze-color { color: #8b4513; }    
        .silver-color { color: #c0c0c0; }    
        .gold-color { color: #ffd700; }      
        .titanium-color { color: #7886a0; }  
        .platinum-color { color: #ffffff; }  
        .diamond-color { color: #00ffff; }   

        #league-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            justify-content: center;
            width: 100%;
        }

        #set-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-items: center;
            width: 100%;
        }

        .set-shield {
            width: 160px;
            height: 180px;
            font-size: 24px;
            border-width: 3px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid #555;
            color: #555;
            padding: 10px 30px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            border-radius: 5px;
        }
        .back-btn:hover { background: #555; color: #fff; }

        #flashcard-area {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .hud {
            position: absolute;
            top: 20px;
            font-size: 24px;
            font-family: monospace;
            color: #888;
        }

        #progress-hud { left: 20px; text-align: left; }
        #score-hud { right: 20px; text-align: right; }
        .score-correct { color: #0f0; }
        .score-failed { color: #f00; }

        #sentence-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .sentence {
            font-size: 4vw; 
            letter-spacing: 1px;
            min-height: 1.2em;
        }

        .state-turkish { color: #ffffff; } 
        .state-german { color: #00ffff; } 

        .clickable-word {
            cursor: pointer;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.4);
            transition: color 0.2s, border-color 0.2s;
            display: inline-block;
            margin: 0 4px;
        }
        .clickable-word:hover {
            color: #ffe81f;
            border-bottom-color: #ffe81f;
        }
        
        #word-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffe81f;
            color: #ffe81f;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 24px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            display: none;
            transform: translate(-50%, -120%);
            white-space: nowrap;
        }

        .touch-controls {
            position: absolute; 
            bottom: 20px; 
            width: 100%; 
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .touch-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
            color: #fff;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .touch-btn:active { transform: scale(0.95); }

        @media (max-width: 800px) {
            #league-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .shield-btn { width: 140px; height: 180px; }
            .shield-number { font-size: 40px; }
            .shield-name { font-size: 18px; }
            .hud { font-size: 16px; top: 10px; }
            .sentence { font-size: 6vw; }
            .touch-btn { padding: 10px 12px; font-size: 12px; }
            #word-tooltip { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1 style="font-size: 42px; letter-spacing: 2px; margin-bottom: 10px;">SELECT LEAGUE</h1>
        <div id="league-grid">
            <div class="shield-container">
                <button class="shield-btn iron-color" onclick="showSets('iron')">
                    <span class="shield-number">1</span><span class="shield-name">Iron</span>
                </button>
                <div id="progress-iron" class="progress-text">0/0 Sets</div>
            </div>
            <div class="shield-container">
                <button class="shield-btn copper-color" onclick="showSets('copper')">

            </div>

            </div>
            <div class="shield-container">

            </div>
            <div class="shield-container">

            </div>
            <div class="shield-container">

                </button>
                <div id="progress-titanium" class="progress-text">0/0 Sets</div>
            </div>
            <div class="shield-container">
                <button class="shield-btn platinum-color" onclick="showSets('platinum')">

                </button>
                <div id="progress-platinum" class="progress-text">0/0 Sets</div>
            </div>
            <div class="shield-container">
                <button class="shield-btn diamond-color" onclick="showSets('diamond')">
                    <span class="shield-number">8</span><span class="shield-name">Diamond</span>
                </button>
                <div id="progress-diamond" class="progress-text">0/0 Sets</div>
            </div>
        </div>
    </div>

    <div id="set-menu" class="menu-container" style="display: none;">
        <h1 id="set-menu-title" style="font-size: 48px; letter-spacing: 2px;">CHOOSE A SET</h1>
        <div id="set-buttons"></div>
        <button class="back-btn" onclick="showMainMenu()">Back to Leagues</button>
    </div>

    <div id="flashcard-area">
        <div id="progress-hud" class="hud">Set: <span id="hud-set">1</span><br>Card <span id="hud-current">0</span> / <span id="hud-total">0</span></div>
        <div id="score-hud" class="hud">Correct: <span id="hud-correct" class="score-correct">0</span><br>Failed: <span id="hud-failed" class="score-failed">0</span></div>
        
        <div id="sentence-container">
            <div id="turkish-text" class="sentence state-turkish"></div>
            <div id="german-text" class="sentence state-german" style="visibility: hidden;"></div>
        </div>

        <div id="word-tooltip"></div>
        
        <div class="touch-controls">
            <button class="touch-btn" onclick="handleAction('reveal')">👁️ Reveal</button>
            <button class="touch-btn" style="border-color: #f00; color: #f00;" onclick="handleAction('fail')">❌ Fail</button>
            <button class="touch-btn" style="border-color: #0f0; color: #0f0;" onclick="handleAction('pass')">✅ Correct</button>
            <button class="touch-btn" onclick="handleAction('undo')">↩️ Undo</button>
            <button class="touch-btn" style="border-color: #ffe81f; color: #ffe81f;" onclick="handleAction('exit')">Exit</button>
        </div>
    </div>

    <div id="results-screen" class="menu-container" style="display: none; justify-content: center; height: 100vh;">
        <h1 style="font-size: 48px; margin-bottom: 10px;">RESULTS</h1>
        <h2 id="results-message" style="color: #888; font-family: monospace; margin-top: 0;"></h2>
        <div style="font-size: 48px; color: orange; margin-bottom: 30px;">Success: <span id="res-percentage">0</span>%</div>
        <div style="font-size: 36px; margin-bottom: 40px;"><span class="score-correct">Correct: <span id="res-correct">0</span></span><br><span class="score-failed">Failed: <span id="res-failed">0</span></span></div>
        
        <div id="failed-prompt-area" style="margin-bottom: 30px; display: none;">
            <div style="font-size: 22px; margin-bottom: 20px; color: #ff0000; font-family: monospace; letter-spacing: 1px;">DO YOU WANT TO CONTINUE WITH THE ONES YOU FAILED TO DO? (<span id="failed-count">0</span> ITEMS)</div>
            <button class="back-btn" onclick="startFailedReview()" style="border-color: #0f0; color: #0f0; margin-right: 20px;">YES</button>
            <button class="back-btn" onclick="closeFailedReview()" style="border-color: #f00; color: #f00;">NO</button>
        </div>

        <div id="standard-result-buttons">
            <button class="back-btn" onclick="showSets(currentLeague)" style="margin-right: 20px;">Back to Sets</button>
            <button class="back-btn" onclick="showMainMenu()">Main Menu</button>
        </div>
    </div>

        let currentLeague = '', currentSetName = '', activeDeck = [], currentIndex = 0, isFlipped = false, scoreCorrect = 0, scoreFailed = 0, isActive = false, scoreHistory = [];

        let completedSets = JSON.parse(localStorage.getItem('el_progress_v9')) || {};
        const leagueIds = ['iron', 'copper', 'bronze', 'silver', 'gold', 'titanium', 'platinum', 'diamond'];
        leagueIds.forEach(l => { if (!completedSets[l]) completedSets[l] = []; });

        function updateMenuProgress() {
            leagueIds.forEach(l => {
                const total = Object.keys(vocabularyData[l]).length;
                const completed = completedSets[l].length;
                const el = document.getElementById(`progress-${l}`);
                if (el) el.innerText = `${completed}/${total} Sets`;
            });
        }

        function hideAll() { ['main-menu', 'set-menu', 'flashcard-area', 'results-screen'].forEach(id => document.getElementById(id).style.display = 'none'); }

        function showMainMenu() { hideAll(); updateMenuProgress(); document.getElementById('main-menu').style.display = 'flex'; isActive = false; }

        function showSets(lId) {
            currentLeague = lId; hideAll();
            const cont = document.getElementById('set-buttons'); cont.innerHTML = '';
            document.getElementById('set-menu-title').innerText = lId.toUpperCase() + " LEAGUE";
            document.getElementById('set-menu-title').className = `${lId}-color`;
            const sets = vocabularyData[lId];
            if (Object.keys(sets).length === 0) { cont.innerHTML = '<div style="color:#888; grid-column: span 2;">Coming soon...</div>'; }
            else {
                for (const sName in sets) {
                    const btn = document.createElement('button');
                    const isDone = completedSets[lId].includes(sName);
                    btn.innerText = isDone ? sName + " ✓" : sName;
                    btn.className = `shield-btn set-shield ${lId}-color`;
                    if(isDone) btn.style.opacity = "0.7";
                    btn.onclick = () => startExercise(sName, sets[sName]);
                    cont.appendChild(btn);
                }
            }
            document.getElementById('set-menu').style.display = 'flex';
        }

        function startExercise(sName, deck) {
            currentSetName = sName; 
            failedCardsCollection = []; 
            activeDeck = [...deck].sort(() => Math.random() - 0.5);
            currentIndex = 0; scoreCorrect = 0; scoreFailed = 0; scoreHistory = []; isActive = true;
            hideAll(); document.getElementById('flashcard-area').style.display = 'block';
            document.getElementById('hud-set').innerText = sName;
            document.getElementById('hud-total').innerText = activeDeck.length;
            updateHUD(); displayCard();
        }

        function updateHUD() {
            document.getElementById('hud-current').innerText = currentIndex + 1;
            document.getElementById('hud-correct').innerText = scoreCorrect;
            document.getElementById('hud-failed').innerText = scoreFailed;
        }

        function displayCard() {
            const trText = activeDeck[currentIndex].tr;
            const trContainer = document.getElementById('turkish-text');
            trContainer.innerHTML = ''; 

            const words = trText.split(' ');
            
            words.forEach((word, idx) => {
                const span = document.createElement('span');
                span.innerText = word + (idx === words.length - 1 ? '' : ' ');
                span.className = 'clickable-word';
                
                const cleanWord = word.split(/['’]/)[0].replace(/[^\w\sğüşıöçĞÜŞİÖÇ]/gi, '').toLocaleLowerCase('tr-TR');
                
                span.onclick = (e) => {
                    e.stopPropagation(); 
                    showTooltip(e, cleanWord, span);
                };
                
                trContainer.appendChild(span);
            });

            document.getElementById('german-text').innerText = activeDeck[currentIndex].de;
            document.getElementById('german-text').style.visibility = 'hidden';
            isFlipped = false;
        }

        function showTooltip(event, cleanWord, spanElement) {
            const tooltip = document.getElementById('word-tooltip');
            let meaning = exactDictionary[cleanWord]; 
            
            if (!meaning) {
                for (let i = 0; i < sortedRoots.length; i++) {
                    if (cleanWord.startsWith(sortedRoots[i])) {
                        meaning = rootDictionary[sortedRoots[i]];
                        break; 
                    }
                }
            }
            
            if (meaning) {
                tooltip.innerText = meaning;
            } else {
                tooltip.innerText = "No translation found"; 
            }
            
            const rect = spanElement.getBoundingClientRect();
            tooltip.style.left = (rect.left + (rect.width / 2)) + 'px';
            tooltip.style.top = (rect.top - 5) + 'px';
            tooltip.style.display = 'block';

            clearTimeout(tooltip.timeoutId);
            tooltip.timeoutId = setTimeout(() => {
                tooltip.style.display = 'none';
            }, 2500);
        }

        document.addEventListener('click', (e) => {
            if (!e.target.classList.contains('clickable-word')) {
                document.getElementById('word-tooltip').style.display = 'none';
            }
        });

        function flipCard() { if (!isFlipped) { document.getElementById('german-text').style.visibility = 'visible'; isFlipped = true; } }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= activeDeck.length) endExercise("Exercise Completed!");
            else { updateHUD(); displayCard(); }
        }

        function endExercise(msg) {
            isActive = false; hideAll();
            if (currentIndex >= activeDeck.length && !document.getElementById('hud-set').innerText.includes("(Failures)") && !completedSets[currentLeague].includes(currentSetName)) {
                completedSets[currentLeague].push(currentSetName);
                localStorage.setItem('el_progress_v9', JSON.stringify(completedSets));
            }
            let total = scoreCorrect + scoreFailed;
            document.getElementById('results-screen').style.display = 'flex';
            document.getElementById('results-message').innerText = msg;
            document.getElementById('res-percentage').innerText = total === 0 ? 0 : Math.round((scoreCorrect / total) * 100);
            document.getElementById('res-correct').innerText = scoreCorrect;
            document.getElementById('res-failed').innerText = scoreFailed;

            const promptArea = document.getElementById('failed-prompt-area');
            const standardButtons = document.getElementById('standard-result-buttons');

            if (failedCardsCollection.length > 0) {
                document.getElementById('failed-count').innerText = failedCardsCollection.length;
                promptArea.style.display = 'block';
                standardButtons.style.display = 'none';
            } else {
                promptArea.style.display = 'none';
                standardButtons.style.display = 'block';
            }
        }

        function startFailedReview() {
            activeDeck = [...failedCardsCollection].sort(() => Math.random() - 0.5);
            failedCardsCollection = []; 
            currentIndex = 0; scoreCorrect = 0; scoreFailed = 0; scoreHistory = []; isActive = true;
            hideAll(); document.getElementById('flashcard-area').style.display = 'block';
            document.getElementById('hud-set').innerText = currentSetName + " (Failures)";
            document.getElementById('hud-total').innerText = activeDeck.length;
            updateHUD(); displayCard();
        }

        function closeFailedReview() {
            failedCardsCollection = []; 
            showSets(currentLeague);
        }

        function handleAction(actionType) {
            if (!isActive) return;

            if (actionType === 'reveal') { 
                flipCard(); 
            }
            else if (actionType === 'pass' && isFlipped) { 
                scoreHistory.push('correct'); scoreCorrect++; nextCard(); 
            }
            else if (actionType === 'fail' && isFlipped) { 
                scoreHistory.push('failed'); scoreFailed++; 
                failedCardsCollection.push(activeDeck[currentIndex]); 
                nextCard(); 
            }
            else if (actionType === 'undo' && currentIndex > 0) {
                currentIndex--; const last = scoreHistory.pop();
                if (last === 'correct') scoreCorrect--; 
                if (last === 'failed') {
                    scoreFailed--;
                    failedCardsCollection.pop(); 
                }
                updateHUD(); 
                displayCard(); 
                document.getElementById('german-text').style.visibility = 'visible'; 
                isFlipped = true;
            }
            else if (actionType === 'exit') {
                endExercise("Aborted");
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!isActive) return;
            
            if (e.key === 'ArrowUp') handleAction('reveal');
            else if (e.key === 'ArrowRight') handleAction('pass');
            else if (e.key === 'ArrowLeft') handleAction('fail');
            else if (e.key === 'ArrowDown') handleAction('undo');
            else if (e.key === 'Escape') handleAction('exit');
        });

        updateMenuProgress();
    </script>
</body>
</html>
